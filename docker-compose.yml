services:
  odoo:
    build:
      context: .
      dockerfile: Dockerfile.odoo
    image: coordos-odoo:17-ocr
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      - COORDOS_CORE_URL=http://coordos-core:8080
    volumes:
      - ./:/mnt/extra-addons/coordos_odoo
      - ./data:/var/lib/odoo
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - ./pgdata:/var/lib/postgresql/data
